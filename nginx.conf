server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ══════════════════════════════════════════════
    # GZIP — compresión agresiva
    # ══════════════════════════════════════════════
    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/x-javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml
        image/x-icon
        font/woff2
        font/ttf
        font/otf;

    # ══════════════════════════════════════════════
    # SECURITY HEADERS — requeridos para 100% BP
    # ══════════════════════════════════════════════
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://*.clarity.ms https://connect.facebook.net; style-src 'self' 'unsafe-inline'; font-src 'self' data: https:; img-src 'self' data: https: blob:; connect-src 'self' https://www.google-analytics.com https://*.clarity.ms https://www.googletagmanager.com https://*.facebook.com https://*.doubleclick.net; frame-src https://www.googletagmanager.com https://td.doubleclick.net; worker-src 'self' blob:; media-src 'self';" always;

    # ══════════════════════════════════════════════
    # LOCATION: HTML (index.html) — SPA routing
    # ══════════════════════════════════════════════
    location / {
        try_files $uri $uri/ /index.html;

        # HTML nunca se cachea (para que los deploys se reflejen)
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;

        # NGINX no hereda headers del server block en location blocks
        # Hay que repetir los headers críticos
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://*.clarity.ms https://connect.facebook.net; style-src 'self' 'unsafe-inline'; font-src 'self' data: https:; img-src 'self' data: https: blob:; connect-src 'self' https://www.google-analytics.com https://*.clarity.ms https://www.googletagmanager.com https://*.facebook.com https://*.doubleclick.net; frame-src https://www.googletagmanager.com https://td.doubleclick.net; worker-src 'self' blob:; media-src 'self';" always;
    }

    # ══════════════════════════════════════════════
    # LOCATION: Assets estáticos (JS, CSS, fonts, imgs)
    # Cache inmutable — Vite agrega hash al nombre
    # ══════════════════════════════════════════════
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff2|woff|ttf|eot|otf|webp|avif)$ {
        expires max;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Vary "Accept-Encoding" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        tcp_nodelay on;
        keepalive_timeout 65;
    }

    # ══════════════════════════════════════════════
    # LOCATION: Fuentes — headers CORS necesarios
    # ══════════════════════════════════════════════
    location ~* \.(?:woff2|woff|ttf|eot|otf)$ {
        expires max;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Access-Control-Allow-Origin "*" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # 404 → SPA routing
    error_page 404 /index.html;
}
