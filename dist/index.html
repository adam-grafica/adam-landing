  <style id="critical-css">
    /* Reset mínimo */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    /* Font faces */
    @font-face{
      font-family:'Syne';
      src:url('/fonts/syne.woff2') format('woff2');
      font-weight:100 900;
      font-style:normal;
      font-display:swap;
    }
    @font-face{
      font-family:'DM Sans';
      src:url('/fonts/dm-sans.woff2') format('woff2');
      font-weight:100 900;
      font-style:normal;
      font-display:swap;
    }
    @font-face{
      font-family:'Space Mono';
      src:url('/fonts/space-mono.woff2') format('woff2');
      font-weight:400 700;
      font-display:swap;
    }

    /* Base */
    body{
      background-color:#0A0A0A;
      color:#FFFFFF;
      font-family:'DM Sans',system-ui,-apple-system,sans-serif;
      overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    h1,h2,h3,h4,h5,h6{
      font-family:'Syne',system-ui,sans-serif;
      font-weight:700;
      line-height:1.1;
    }

    /* Nav */
    nav{
      position:fixed;top:0;left:0;right:0;z-index:50;
      background:rgba(8,8,14,0.75);
      backdrop-filter:blur(20px) saturate(180%);
      -webkit-backdrop-filter:blur(20px) saturate(180%);
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    /* Hero section */
    .hero-prerender-section{
      position:relative;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0A0A0A;
    }

    /* FIX LCP — fuerza visibilidad antes que GSAP tome control */
    .hero-headline,
    .hero-headline span,
    .lcp-element,
    .lcp-element span{
      opacity:1!important;
      visibility:visible!important;
      transform:none!important;
    }
    .hero-subheadline{
      opacity:1!important;
      visibility:visible!important;
    }

    /* Elementos que SÍ se ocultan para animación GSAP */
    .hero-eyebrow,.hero-ctas,.hero-social-proof{opacity:0}
    .hero-mesh{opacity:0;transform:scale(0.85)}

    /* Gradient text */
    .gradient-text{
      background:linear-gradient(135deg,#0066FF 0%,#00AAFF 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }

    /* Root container */
    #root{min-height:100vh}

    /* Ocultar prerender cuando React monta */
    #root:not(:empty) + #hero-prerender,
    #root:not(:empty) ~ #hero-prerender{
      display:none!important;
    }
  </style>

  <!-- 5. GTM TRIPLE DEFERRED — no impacta TBT        -->
  <!-- ══════════════════════════════════════════════ -->
  <script>
    // DataLayer debe existir antes de que GTM cargue
    window.dataLayer = window.dataLayer || [];

    (function() {
      var gtmLoaded = false;

      function loadGTM() {
        if (gtmLoaded) return;
        gtmLoaded = true;

        // Remover listeners de interacción
        var events = ['scroll','click','touchstart','keydown','mousemove'];
        events.forEach(function(evt) {
          document.removeEventListener(evt, onInteraction, {passive: true});
        });

        // Cargar GTM dentro de requestIdleCallback
        // para no competir con ninguna tarea del hilo principal
        var doLoad = function() {
          window.dataLayer.push({
            'gtm.start': new Date().getTime(),
            event: 'gtm.js'
          });

          var script = document.createElement('script');
          script.src = 'https://www.googletagmanager.com/gtm.js?id=GTM-MC5GNM34';
          script.async = true;
          document.head.appendChild(script);
        };

        if ('requestIdleCallback' in window) {
          requestIdleCallback(doLoad, { timeout: 3000 });
        } else {
          setTimeout(doLoad, 1);
        }
      }

      function onInteraction() {
        loadGTM();
      }

      // TRIGGER 1: Cualquier interacción del usuario
      ['scroll','click','touchstart','keydown','mousemove'].forEach(function(evt) {
        document.addEventListener(evt, onInteraction, {
          passive: true,
          once: true
        });
      });

      // TRIGGER 2: Fallback 5 segundos después de load
      // Lighthouse no interactúa, así que GTM se carga
      // fuera de la ventana de medición de TBT
      window.addEventListener('load', function() {
        setTimeout(loadGTM, 5000);
      });
    })();
  </script>
