    <!-- 3. CSS CRÍTICO INLINE (nav + hero, ~3KB) -->
    <style id="critical-css">
      /* RESET MÍNIMO */
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

      /* FUENTES — font-display:swap es la línea más importante */
      @font-face{
        font-family:'Syne';
        src:url('/fonts/syne.woff2') format('woff2');
        font-weight:100 900;
        font-style:normal;
        font-display:swap;
      }
      @font-face{
        font-family:'DM Sans';
        src:url('/fonts/dm-sans.woff2') format('woff2');
        font-weight:100 900;
        font-style:normal;
        font-display:swap;
      }
      @font-face{
        font-family:'Space Mono';
        src:url('/fonts/space-mono.woff2') format('woff2');
        font-weight:400 700;
        font-display:swap;
      }

      /* BODY BASE */
      body{
        background-color:#0A0A0A;
        color:#FFFFFF;
        font-family:'DM Sans',system-ui,-apple-system,sans-serif;
        overflow-x:hidden;
        -webkit-font-smoothing:antialiased;
        -moz-osx-font-smoothing:grayscale;
      }

      /* HEADINGS */
      h1,h2,h3,h4,h5,h6{
        font-family:'Syne',system-ui,sans-serif;
        font-weight:700;
        line-height:1.1;
      }

      /* NAV — visible de inmediato, above the fold */
      nav{
        position:fixed;
        top:0;
        left:0;
        right:0;
        z-index:50;
        background:rgba(8,8,14,0.75);
        backdrop-filter:blur(20px) saturate(180%);
        -webkit-backdrop-filter:blur(20px) saturate(180%);
        border-bottom:1px solid rgba(255,255,255,0.08);
      }

      /* HERO SECTION — visible de inmediato, NO opacity:0 */
      section[aria-label="Hero Section"]{
        position:relative;
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        overflow:hidden;
      }

      /* H1 DEL HERO — el LCP element: SIEMPRE visible */
      .hero-headline{
        opacity:1 !important;
        visibility:visible !important;
      }
      .lcp-element span{
        display:block;
        opacity:1;
      }

      /* Otros hero elements ocultos para animación GSAP */
      .hero-eyebrow,.hero-ctas,.hero-social-proof{opacity:0}
      .hero-mesh{opacity:0;transform:scale(0.85)}

      /* Gradient text utility */
      .gradient-text{
        background:linear-gradient(135deg,#0066FF 0%,#00AAFF 100%);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        background-clip:text;
      }

      /* Root div */
      #root{min-height:100vh}
    </style>
